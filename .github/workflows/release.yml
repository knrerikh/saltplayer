name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

  publish:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ffmpeg-static downloads a single binary for the host arch during postinstall.
      # When cross-compiling x64 DMG on a macos-latest (ARM64) runner, the bundled binary
      # would be ARM64 and crash with EBADARCH on Intel Macs. Re-download for the target arch.
      - name: Force x64 ffmpeg binary (macOS x64 cross-compile)
        if: matrix.os == 'macos-latest' && matrix.arch == 'x64'
        working-directory: node_modules/ffmpeg-static
        env:
          npm_config_platform: darwin
          npm_config_arch: x64
        run: |
          rm -f ffmpeg
          node install.js
          file ffmpeg

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }}

      - name: Build application
        run: npm run build

      - name: Package and publish
        run: npm run package -- --publish always ${{ matrix.arch && format('--{0}', matrix.arch) || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
